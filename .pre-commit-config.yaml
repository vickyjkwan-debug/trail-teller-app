minimum_pre_commit_version: "3.7.0"
fail_fast: true
default_install_hook_types:
  - pre-commit
  - pre-push
repos:
  - repo: local
    hooks:
      - id: swiftformat
        name: swiftformat
        entry: >-
          bash -lc 'if [ "$#" -eq 0 ]; then exit 0; fi; swiftformat --quiet "$@"' --
        language: system
        types:
          - swift
        stages:
          - pre-commit

      - id: swiftlint
        name: swiftlint
        entry: >-
          bash -lc 'if [ "$#" -eq 0 ]; then exit 0; fi; i=0; for f in "$@"; do export "SCRIPT_INPUT_FILE_${i}=$f"; i=$((i+1)); done; export SCRIPT_INPUT_FILE_COUNT="$i"; swiftlint lint --strict --force-exclude --use-script-input-files'
        language: system
        types:
          - swift
        stages:
          - pre-commit

      - id: xcodebuild-build-for-testing
        name: xcodebuild build-for-testing (iOS Simulator)
        entry: bash scripts/pre-push-build-for-testing.sh
        language: system
        pass_filenames: false
        always_run: true
        stages:
          - pre-push
